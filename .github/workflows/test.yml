name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        go-version: ["1.25"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify Go version meets go.mod requirement
        run: |
          GOMOD_GO=$(grep '^go ' go.mod | awk '{print $2}')
          RUNNER_GO=$(go version | sed 's/.*go\([0-9.]\+\).*/\1/')
          HIGHEST=$(printf '%s\n%s' "$GOMOD_GO" "$RUNNER_GO" | sort -V | tail -1)
          if [ "$HIGHEST" != "$RUNNER_GO" ]; then
            echo "::error::Go runner version $RUNNER_GO is older than go.mod requires ($GOMOD_GO). Update the go-version matrix."
            exit 1
          fi
          echo "Go $RUNNER_GO meets go.mod requirement >= $GOMOD_GO ✓"

      - run: go test -short -race -coverprofile=coverage.out ./...

      - run: go tool cover -func=coverage.out

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          THRESHOLD=60
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "Coverage $COVERAGE% is below threshold $THRESHOLD%"
            exit 1
          fi
          echo "Coverage $COVERAGE% meets threshold $THRESHOLD%"

      - run: go vet ./...
